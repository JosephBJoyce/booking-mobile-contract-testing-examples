##
## PactFlow Setup
##
## Run this workflow ONCE before running the consumer/provider workflows.
## It registers the four pacticipants and the production + staging environments
## in smart-bank.pactflow.io via the PactFlow REST API (no npm install needed).
##
## Trigger manually from: Actions → PactFlow Setup → Run workflow
##
## It is safe to re-run — existing resources are left unchanged (409 = already exists).
##

name: PactFlow Setup

on:
  workflow_dispatch:

env:
  PACT_BROKER_BASE_URL: https://smart-bank.pactflow.io
  PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

jobs:
  setup:
    name: Register Environments & Pacticipants
    runs-on: ubuntu-latest

    steps:
      # ─── Environments ──────────────────────────────────────────────

      - name: Create production environment
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.PACT_BROKER_BASE_URL }}/environments" \
            -H "Authorization: Bearer ${{ env.PACT_BROKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/hal+json" \
            -d '{"name":"production","displayName":"Production","production":true}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "Status: $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "✓ production environment created"
          elif [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ] || [ "$STATUS" = "400" ]; then
            echo "✓ production environment already exists (or name conflict — check body above)"
          else
            echo "Unexpected status: $STATUS" && exit 1
          fi

      - name: Create staging environment
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.PACT_BROKER_BASE_URL }}/environments" \
            -H "Authorization: Bearer ${{ env.PACT_BROKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/hal+json" \
            -d '{"name":"staging","displayName":"Staging","production":false}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "Status: $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "✓ staging environment created"
          elif [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ] || [ "$STATUS" = "400" ]; then
            echo "✓ staging environment already exists (or name conflict — check body above)"
          else
            echo "Unexpected status: $STATUS" && exit 1
          fi

      # ─── Pacticipants ──────────────────────────────────────────────

      - name: Register booking-flights-mobile-consumer
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.PACT_BROKER_BASE_URL }}/pacticipants" \
            -H "Authorization: Bearer ${{ env.PACT_BROKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/hal+json" \
            -d '{"name":"booking-flights-mobile-consumer","displayName":"Booking Flights Mobile Consumer","mainBranch":"main"}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "Status: $STATUS"
          echo "Body: $BODY"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ] \
            && echo "✓ booking-flights-mobile-consumer registered" || (echo "Failed: $STATUS" && exit 1)

      - name: Register booking-flights-api
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.PACT_BROKER_BASE_URL }}/pacticipants" \
            -H "Authorization: Bearer ${{ env.PACT_BROKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/hal+json" \
            -d '{"name":"booking-flights-api","displayName":"Booking Flights API","mainBranch":"main"}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "Status: $STATUS"
          echo "Body: $BODY"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ] \
            && echo "✓ booking-flights-api registered" || (echo "Failed: $STATUS" && exit 1)

      - name: Register booking-attractions-mobile-consumer
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.PACT_BROKER_BASE_URL }}/pacticipants" \
            -H "Authorization: Bearer ${{ env.PACT_BROKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/hal+json" \
            -d '{"name":"booking-attractions-mobile-consumer","displayName":"Booking Attractions Mobile Consumer","mainBranch":"main"}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "Status: $STATUS"
          echo "Body: $BODY"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ] \
            && echo "✓ booking-attractions-mobile-consumer registered" || (echo "Failed: $STATUS" && exit 1)

      - name: Register booking-attractions-api
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ env.PACT_BROKER_BASE_URL }}/pacticipants" \
            -H "Authorization: Bearer ${{ env.PACT_BROKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/hal+json" \
            -d '{"name":"booking-attractions-api","displayName":"Booking Attractions API","mainBranch":"main"}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "Status: $STATUS"
          echo "Body: $BODY"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ] \
            && echo "✓ booking-attractions-api registered" || (echo "Failed: $STATUS" && exit 1)

      - name: Setup complete
        run: |
          echo ""
          echo "=== PactFlow workspace ready ==="
          echo "Broker: ${{ env.PACT_BROKER_BASE_URL }}"
          echo ""
          echo "Registered:"
          echo "  Environments : production, staging"
          echo "  Pacticipants : booking-flights-mobile-consumer"
          echo "                 booking-flights-api"
          echo "                 booking-attractions-mobile-consumer"
          echo "                 booking-attractions-api"
          echo ""
          echo "Next: run Consumer — Flights Mobile, then Consumer — Attractions Mobile,"
          echo "      then the two provider workflows."
